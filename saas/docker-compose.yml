services:
  postgres:
    image: postgres:16-alpine
    container_name: career-ops-postgres
    environment:
      POSTGRES_DB: career_ops
      POSTGRES_USER: career_ops
      POSTGRES_PASSWORD: career_ops
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - career-ops-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career_ops"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: career-ops-redis
    ports:
      - "6379:6379"
    networks:
      - career-ops-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: career-ops-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - career-ops-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:

networks:
  career-ops-network:
    driver: bridge
