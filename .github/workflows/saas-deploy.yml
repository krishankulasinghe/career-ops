name: SaaS Deploy

on:
  workflow_run:
    workflows: ["SaaS CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      regions:
        description: "Regions to deploy (comma-separated, or 'all')"
        required: false
        default: "all"

env:
  APP_NAME: career-ops
  ECR_REPO: career-ops-saas

jobs:
  # ─── Build & Push Docker Image ──────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    environment: production
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.sha.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (primary)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: meta
        uses: docker/build-push-action@v5
        with:
          context: ./saas
          file: ./saas/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:sha-${{ steps.sha.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:sha-${{ steps.sha.outputs.short_sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0 # warn only — block in security-review workflow

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ─── Deploy to US-East-1 ────────────────────────────────────────────────────
  deploy-us:
    name: Deploy → us-east-1
    needs: build
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.regions == '' || github.event.inputs.regions == 'all' || contains(github.event.inputs.regions, 'us-east-1')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (US)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition career-ops-production-us-east-1-app \
            --query taskDefinition > task-def-us.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-us.json
          container-name: app
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:sha-${{ needs.build.outputs.short_sha }}

      - name: Deploy to ECS (us-east-1)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: career-ops-production-us-east-1-app
          cluster: career-ops-production-us-east-1
          wait-for-service-stability: true

  # ─── Deploy to EU-West-1 ────────────────────────────────────────────────────
  deploy-eu:
    name: Deploy → eu-west-1
    needs: [build, deploy-us]
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.regions == '' || github.event.inputs.regions == 'all' || contains(github.event.inputs.regions, 'eu-west-1')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (EU)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_EU }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_EU }}
          aws-region: eu-west-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition career-ops-production-eu-west-1-app \
            --query taskDefinition > task-def-eu.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-eu.json
          container-name: app
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:sha-${{ needs.build.outputs.short_sha }}

      - name: Deploy to ECS (eu-west-1)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: career-ops-production-eu-west-1-app
          cluster: career-ops-production-eu-west-1
          wait-for-service-stability: true

  # ─── Deploy to AP-Southeast-1 ────────────────────────────────────────────────
  deploy-apac:
    name: Deploy → ap-southeast-1
    needs: [build, deploy-eu]
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.regions == '' || github.event.inputs.regions == 'all' || contains(github.event.inputs.regions, 'ap-southeast-1')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (APAC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_APAC }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_APAC }}
          aws-region: ap-southeast-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition career-ops-production-ap-southeast-1-app \
            --query taskDefinition > task-def-apac.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-apac.json
          container-name: app
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:sha-${{ needs.build.outputs.short_sha }}

      - name: Deploy to ECS (ap-southeast-1)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: career-ops-production-ap-southeast-1-app
          cluster: career-ops-production-ap-southeast-1
          wait-for-service-stability: true

  # ─── Post-Deployment Smoke Tests ────────────────────────────────────────────
  smoke-test:
    name: Smoke Tests
    needs: [deploy-us, deploy-eu, deploy-apac]
    runs-on: ubuntu-latest
    if: always() && (needs.deploy-us.result == 'success')

    steps:
      - uses: actions/checkout@v4

      - name: Health check — US
        run: |
          curl -sf https://us.career-ops.io/health | jq '.status' | grep -q '"ok"'
          echo "US health check passed"

      - name: Health check — EU
        run: |
          curl -sf https://eu.career-ops.io/health | jq '.status' | grep -q '"ok"'
          echo "EU health check passed"

      - name: Health check — APAC
        run: |
          curl -sf https://ap.career-ops.io/health | jq '.status' | grep -q '"ok"'
          echo "APAC health check passed"

      - name: Notify deployment complete
        if: success()
        run: |
          echo "✅ Multi-region deployment complete: sha-${{ needs.build.outputs.short_sha }}"
          echo "  US:   https://us.career-ops.io"
          echo "  EU:   https://eu.career-ops.io"
          echo "  APAC: https://ap.career-ops.io"
