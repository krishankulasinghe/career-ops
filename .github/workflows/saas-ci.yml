name: SaaS CI

on:
  push:
    branches: [main]
    paths:
      - 'saas/**'
      - '.github/workflows/saas-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'saas/**'
      - '.github/workflows/saas-ci.yml'

concurrency:
  group: saas-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saas

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: saas/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true  # non-blocking in MVP, harden later

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    defaults:
      run:
        working-directory: saas

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: saas/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    defaults:
      run:
        working-directory: saas/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: saas/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}-saas
            ghcr.io/${{ github.repository }}-saas-worker
            ghcr.io/${{ github.repository }}-saas-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: saas
          file: saas/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}-saas:latest,ghcr.io/${{ github.repository }}-saas:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Worker image
        uses: docker/build-push-action@v5
        with:
          context: saas
          file: saas/Dockerfile.worker
          push: true
          tags: ghcr.io/${{ github.repository }}-saas-worker:latest,ghcr.io/${{ github.repository }}-saas-worker:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: saas/frontend
          file: saas/frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}-saas-frontend:latest,ghcr.io/${{ github.repository }}-saas-frontend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: npm audit (backend)
        working-directory: saas
        run: npm audit --audit-level=high || true  # warn only, don't block

      - name: npm audit (frontend)
        working-directory: saas/frontend
        run: npm audit --audit-level=high || true

      - name: Trivy filesystem scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: saas
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: Trivy filesystem scan (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: saas/frontend
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: Upload Trivy results (backend)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Upload Trivy results (frontend)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
